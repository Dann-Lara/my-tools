# ─────────────────────────────────────────────────────────────────────────────
# Production overrides
#
# Usage:
#   docker compose --env-file .env.prod \
#     -f docker-compose.yml \
#     -f docker-compose.prod.yml \
#     up -d
# ─────────────────────────────────────────────────────────────────────────────
services:
  backend:
    build:
      target: production
    restart: always
    environment:
      # In prod Redis requires a password — override the docker-compose base
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    deploy:
      resources:
        limits:
          memory: 512M

  frontend:
    build:
      target: production
    restart: always
    deploy:
      resources:
        limits:
          memory: 256M

  n8n:
    restart: always
    # Production: n8n sits behind nginx/traefik, not exposed directly
    ports: []

  postgres:
    ports: []
    # Use named volume with external backup in prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    ports: []
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
